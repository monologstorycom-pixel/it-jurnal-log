<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — IT Jurnal Log</title>
    <meta name="theme-color" content="#1a3a1a">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(57,255,20,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57,255,20,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .container {
            position: relative;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .logo {
            font-size: 14px;
            color: #39ff14;
            opacity: 0.6;
            margin-bottom: 2rem;
            letter-spacing: 3px;
        }

        .terminal-box {
            background: #111;
            border: 1px solid #1a3a1a;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 0.5px solid #1a3a1a;
        }

        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
        }
        .dot-r { background: #3a1a1a; }
        .dot-y { background: #3a3a1a; }
        .dot-g { background: #1a3a1a; }

        .terminal-title {
            font-size: 11px;
            color: #444;
            margin-left: auto;
            letter-spacing: 1px;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .prompt {
            color: #39ff14;
            font-size: 13px;
            text-align: left;
            line-height: 2;
        }

        .prompt .cmd { color: #39ff14; }
        .prompt .err { color: #ff4444; }
        .prompt .info { color: #666; }
        .prompt .warn { color: #f0a500; }

        .cursor {
            display: inline-block;
            width: 8px; height: 14px;
            background: #39ff14;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1a3a1a;
            border: 1px solid #39ff14;
            color: #39ff14;
            padding: 10px 24px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }
        .btn-retry:hover { background: #243a24; }

        .status-bar {
            font-size: 11px;
            color: #333;
            margin-top: 2rem;
            letter-spacing: 1px;
        }

        .online-toast {
            display: none;
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a3a1a;
            border: 1px solid #39ff14;
            color: #39ff14;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">&gt;_ IT JURNAL LOG</div>

        <div class="terminal-box">
            <div class="terminal-header">
                <div class="dot dot-r"></div>
                <div class="dot dot-y"></div>
                <div class="dot dot-g"></div>
                <span class="terminal-title">network.log</span>
            </div>

            <div class="prompt">
                <div><span class="cmd">$ ping server.itlog.local</span></div>
                <div><span class="err">ERR  Request timeout — no route to host</span></div>
                <div><span class="info">---  koneksi internet terputus</span></div>
                <div>&nbsp;</div>
                <div><span class="warn">WARN Bekerja dalam mode offline</span></div>
                <div><span class="info">INFO Data terakhir tersedia dari cache</span></div>
                <div>&nbsp;</div>
                <div><span class="cmd">$ waiting for connection</span><span class="cursor"></span></div>
            </div>
        </div>

        <a href="/" class="btn-retry" onclick="window.location.reload(); return false;">
            ↺ &nbsp;Coba Reconnect
        </a>

        <div class="status-bar" id="statusBar">status: offline</div>
    </div>

    <div class="online-toast" id="onlineToast">
        ✓ &nbsp;Koneksi pulih — mengalihkan...
    </div>

    <script>
        // Auto redirect kalau online
        window.addEventListener('online', () => {
            const toast = document.getElementById('onlineToast');
            toast.style.display = 'block';
            document.getElementById('statusBar').textContent = 'status: reconnecting...';
            setTimeout(() => window.location.href = '/', 1500);
        });

        window.addEventListener('offline', () => {
            document.getElementById('statusBar').textContent = 'status: offline';
        });

        // Cek status saat load
        document.getElementById('statusBar').textContent =
            navigator.onLine ? 'status: online (halaman di-cache)' : 'status: offline';
    </script>
</body>
</html>
